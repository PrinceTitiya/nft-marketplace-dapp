name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20

jobs:
  contracts:
    name: Contracts (Hardhat)
    runs-on: ubuntu-latest
    env:
      # Dummy values so hardhat.config.js can resolve the sepolia/mainnet
      # network entries during compile/test — no real network is contacted.
      # This is the well-known, publicly documented Anvil/Hardhat test key #0.
      PRIVATE_KEY: ac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      SEPOLIA_RPC_URL: https://sepolia.example.invalid
      ETHERSCAN_API_KEY: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint Solidity
        run: yarn lint

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run tests
        run: npx hardhat test

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_PROJECT_ID: dummy-project-id-for-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

  subgraph:
    name: Subgraph
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: subgraph
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: subgraph/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Codegen
        run: yarn codegen

      - name: Build
        run: yarn build
